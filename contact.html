<main>
<section>
  <h2>Contact Me</h2>

  <form>
    <label>Name</label>
    <input type="text" name="name" required minlength="2">

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Message</label>
    <textarea name="message" required minlength="10"></textarea>

    <button type="submit">Send</button>
  </form>
</section>
</main>
